name: App CI (Flutter)

# Se activa cuando exista el proyecto Flutter real (app/pubspec.yaml o app/lib/**).
on:
  push:
    branches: [main, develop]
    paths: ['app/pubspec.yaml', 'app/lib/**', '.github/workflows/app-ci.yml']
  pull_request:
    branches: [main, develop]
    paths: ['app/pubspec.yaml', 'app/lib/**', '.github/workflows/app-ci.yml']
  workflow_dispatch: {}

jobs:
  analyze-test-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java (para build Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Format check
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Tests
        run: flutter test

      - name: Build APK (debug)
        run: flutter build apk --debug
