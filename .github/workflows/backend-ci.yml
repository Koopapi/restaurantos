name: Backend CI

# Corre en TODOS los PR/push a main/develop (sin filtro de paths) para que el
# check `build-test` siempre reporte un resultado y pueda seguir siendo
# obligatorio en las ramas protegidas. Si el PR no toca el backend, el job pasa
# sin ejecutar pruebas (ver el paso de detección de cambios).
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch: {}

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ¿El PR/push toca el backend?
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/backend-ci.yml'

      - name: Setup Node
        if: steps.changes.outputs.backend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        if: steps.changes.outputs.backend == 'true'
        working-directory: backend
        run: npm ci

      - name: Lint
        if: steps.changes.outputs.backend == 'true'
        working-directory: backend
        run: npm run lint --if-present

      - name: Test
        if: steps.changes.outputs.backend == 'true'
        working-directory: backend
        run: npm test --if-present

      - name: Sin cambios en backend
        if: steps.changes.outputs.backend != 'true'
        run: echo "No hay cambios en backend/ — check satisfecho sin ejecutar pruebas."
